<div class="genre-list-container">
  <div class="header-section">
    <h2 class="genre-list-title">Géneros</h2>
    <button mat-raised-button color="primary" class="new-genre-btn">
      <mat-icon>add</mat-icon>
      Nuevo Género
    </button>
  </div>

  <div class="table-container">
    <table mat-table [dataSource]="genres() ?? []" matSort class="mat-elevation-1">
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>ID</th>
        <td mat-cell *matCellDef="let genre">{{ genre.id }}</td>
      </ng-container>

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Nombre</th>
        <td mat-cell *matCellDef="let genre">{{ genre.name }}</td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Estado</th>
        <td mat-cell *matCellDef="let genre">
          <span class="status-badge" [class.active]="genre.status" [class.inactive]="!genre.status">
            {{ genre.status ? 'Activo' : 'Inactivo' }}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let genre">
          <button
            mat-icon-button
            color="primary"
            matTooltip="Editar género"
            (click)="openGenreModal(genre.id)"
          >
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" matTooltip="Eliminar género">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </div>
</div>
