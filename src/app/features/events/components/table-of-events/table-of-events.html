<div class="event-list-container">
  <div class="header-section">
    <h2 class="event-list-title">Eventos</h2>
    <button mat-raised-button color="primary" class="new-event-btn">
      <mat-icon>add</mat-icon>
      Nuevo Evento
    </button>
  </div>

  <div class="table-container">
    <table mat-table [dataSource]="events()" matSort class="mat-elevation-1">
      <ng-container matColumnDef="imageUrl">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Imagen</th>
        <td mat-cell *matCellDef="let event">
          <img [src]="event.imageUrl" [alt]="event.title" class="event-image" />
        </td>
      </ng-container>

      <ng-container matColumnDef="title">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Título</th>
        <td mat-cell *matCellDef="let event">{{ event.title }}</td>
      </ng-container>

      <ng-container matColumnDef="genre">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Género</th>
        <td mat-cell *matCellDef="let event">{{ event.genre }}</td>
      </ng-container>

      <ng-container matColumnDef="dateEvent">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Fecha</th>
        <td mat-cell *matCellDef="let event">{{ event.dateEvent }}</td>
      </ng-container>

      <ng-container matColumnDef="unitPrice">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Precio</th>
        <td mat-cell *matCellDef="let event">S/{{ event.unitPrice }}</td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Estado</th>
        <td mat-cell *matCellDef="let event">
          <span
            class="status-badge"
            [class.active]="event.status === 'Activo'"
            [class.finalized]="event.finalized"
          >
            {{ event.finalized ? 'Finalizado' : 'Activo' }}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let event">
          <button
            mat-icon-button
            color="primary"
            routerLink="/customer/events/form/{{ event.id }}"
            matTooltip="Editar evento"
          >
            <mat-icon>edit</mat-icon>
          </button>
          <button
            (click)="deleteEvent(event.id)"
            mat-icon-button
            color="warn"
            matTooltip="Eliminar evento"
          >
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </div>
</div>
