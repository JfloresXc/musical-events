<div class="event-detail-container">
  <div class="event-image">
    <img [src]="event()?.imageUrl" alt="{{ event()?.description }}" />
  </div>
  <div class="event-info">
    <h1>{{ event()?.title }}</h1>

    <span class="genre-badge">{{ event()?.genre }}</span>

    <p class="event-description">{{ event()?.description }}</p>

    <div class="event-meta">
      <div class="event-meta-item">
        <span class="event-meta-label">Fecha:</span>
        <span class="event-meta-value">{{ event()?.dateEvent }}</span>
      </div>
      <div class="event-meta-item">
        <span class="event-meta-label">Precio:</span>
        <span class="event-meta-value">{{ event()?.unitPrice }}</span>
      </div>
      <div class="event-meta-item">
        <span class="event-meta-label">Lugar:</span>
        <span class="event-meta-value">{{ event()?.place }}</span>
      </div>
    </div>

    <button mat-raised-button color="primary" (click)="buyTicket()">
      <mat-icon>shopping_cart</mat-icon>
      Comprar entrada
    </button>
  </div>
</div>
